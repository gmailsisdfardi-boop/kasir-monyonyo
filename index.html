<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Susu Monyonyo — Kasir HIMA</title>
<meta name="description" content="Sistem kasir digital Susu Monyonyo untuk anggota HIMA">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* ==========================================
   SUSU MONYONYO KASIR — CSS
   Stack: Vanilla HTML/CSS/JS (tanpa framework)
   Deploy: GitHub Pages / Netlify / Vercel (gratis)
   ========================================== */

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brown-50:#FDF6F0;
  --brown-100:#F5E6D3;
  --brown-200:#E8C9A0;
  --brown-300:#D4A574;
  --brown-400:#B8874A;
  --brown-500:#8B5E3C;
  --brown-600:#6B4226;
  --brown-700:#4A2D18;
  --cream:#FEFBF6;
  --warm-white:#FFFEF9;
  --text-dark:#2C1A0E;
  --text-mid:#5C3D20;
  --text-light:#8B6A4A;
  --success:#2D7D32;
  --danger:#C62828;
  --shadow:0 2px 12px rgba(44,26,14,0.12);
  --radius:12px;
  --radius-sm:8px;
  --radius-lg:16px;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
  font-size: 14px;
}

/* ===== HEADER ===== */
.header {
  background: var(--brown-600);
  color: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(44,26,14,0.3);
}

.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px;
  background: var(--brown-300);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700;
}
.logo-sub {
  font-size: 11px; opacity: 0.75;
  letter-spacing: 1px; text-transform: uppercase;
}

.nav { display: flex; gap: 4px; }
.nav-btn {
  background: rgba(255,255,255,0.15);
  border: none; color: white;
  padding: 7px 14px; border-radius: 20px;
  cursor: pointer; font-size: 12px; font-weight: 600;
  transition: all 0.2s;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.nav-btn:hover { background: rgba(255,255,255,0.25); }
.nav-btn.active { background: white; color: var(--brown-600); }

.content { padding: 16px; max-width: 1100px; margin: 0 auto; }

/* ===== HALAMAN KASIR ===== */
.kasir-grid {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 16px;
  min-height: calc(100vh - 130px);
}
@media (max-width: 768px) {
  .kasir-grid { grid-template-columns: 1fr; }
  .nav-btn span.label { display: none; }
}

.menu-section, .cart-section {
  background: white;
  border-radius: var(--radius-lg);
  padding: 16px;
  border: 1.5px solid var(--brown-100);
}
.cart-section { display: flex; flex-direction: column; }

.section-title {
  font-size: 12px; font-weight: 700;
  color: var(--text-light);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 14px;
}

/* Menu grid */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}
.menu-card {
  background: var(--brown-50);
  border: 1.5px solid var(--brown-100);
  border-radius: var(--radius);
  padding: 14px; cursor: pointer;
  transition: all 0.15s; position: relative;
  user-select: none;
}
.menu-card:hover:not(.out-of-stock) {
  border-color: var(--brown-400);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.menu-card:active:not(.out-of-stock) { transform: scale(0.97); }
.menu-card.out-of-stock { opacity: 0.5; cursor: not-allowed; }
.menu-emoji { font-size: 30px; margin-bottom: 8px; display: block; }
.menu-name { font-weight: 700; font-size: 12px; line-height: 1.3; margin-bottom: 4px; }
.menu-price { color: var(--brown-500); font-weight: 700; font-size: 14px; }
.stock-badge {
  position: absolute; top: 8px; right: 8px;
  background: var(--brown-200); color: var(--brown-700);
  font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 10px;
}
.stock-badge.low { background: #FFF3E0; color: #E65100; }
.stock-badge.zero { background: #FFEBEE; color: var(--danger); }

/* Cart */
.cart-items { flex: 1; overflow-y: auto; }
.cart-empty { text-align: center; padding: 40px 20px; color: var(--text-light); }
.cart-empty-icon { font-size: 44px; margin-bottom: 10px; }

.cart-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 6px;
  border-bottom: 1px solid var(--brown-50);
}
.cart-item-name { flex: 1; font-weight: 600; font-size: 13px; }
.cart-item-price { font-size: 11px; color: var(--text-light); }

.qty-ctrl { display: flex; align-items: center; gap: 6px; }
.qty-btn {
  width: 26px; height: 26px;
  border: 1.5px solid var(--brown-300);
  background: white; border-radius: 6px; cursor: pointer;
  font-size: 16px; font-weight: 700;
  color: var(--brown-600);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s; line-height: 1;
}
.qty-btn:hover { background: var(--brown-100); }
.qty-num { font-weight: 700; font-size: 14px; min-width: 22px; text-align: center; }
.item-total { font-weight: 700; font-size: 13px; color: var(--brown-600); min-width: 68px; text-align: right; }
.remove-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-light); font-size: 14px;
  padding: 3px 5px; border-radius: 4px;
}
.remove-btn:hover { color: var(--danger); background: #FFEBEE; }

.cart-footer {
  border-top: 2px solid var(--brown-100);
  padding-top: 14px; margin-top: 10px;
}
.total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.total-label { font-size: 12px; color: var(--text-light); font-weight: 600; }
.total-amount { font-size: 24px; font-weight: 800; color: var(--brown-600); font-family: 'Playfair Display', serif; }

.payment-label {
  font-size: 11px; font-weight: 700; color: var(--text-light);
  letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px;
}
.payment-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.pay-btn {
  padding: 10px; border: 2px solid var(--brown-200);
  background: white; border-radius: var(--radius-sm); cursor: pointer;
  font-weight: 700; font-size: 13px; color: var(--text-mid);
  transition: all 0.15s; font-family: 'Plus Jakarta Sans', sans-serif;
}
.pay-btn.selected { border-color: var(--brown-500); background: var(--brown-50); color: var(--brown-600); }

.btn-primary {
  width: 100%; padding: 14px;
  background: var(--brown-600); color: white; border: none;
  border-radius: var(--radius); font-size: 15px; font-weight: 800;
  cursor: pointer; transition: all 0.15s;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.btn-primary:hover { background: var(--brown-700); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-secondary {
  width: 100%; padding: 10px; margin-top: 8px;
  background: none; border: 1.5px solid var(--brown-200);
  color: var(--text-light); border-radius: var(--radius);
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.15s;
}
.btn-secondary:hover { border-color: var(--brown-400); color: var(--text-mid); }

/* ===== NOTIFIKASI ===== */
.notif {
  position: fixed; top: 70px; left: 50%;
  transform: translateX(-50%);
  background: var(--success); color: white;
  padding: 12px 24px; border-radius: 30px;
  font-weight: 700; font-size: 14px;
  z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  animation: slideDown 0.3s ease;
  white-space: nowrap;
}
.notif.error { background: var(--danger); }
@keyframes slideDown {
  from { opacity: 0; transform: translateX(-50%) translateY(-16px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ===== DASHBOARD ===== */
.sheets-banner {
  background: #E8F5E9; border: 1.5px solid #A5D6A7;
  border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 16px; display: flex; gap: 12px; align-items: flex-start;
}
.sheets-text { font-size: 13px; color: #2E7D32; line-height: 1.6; flex: 1; }
.sheets-url-wrap { display: flex; gap: 8px; margin-top: 8px; }
.sheets-input {
  flex: 1; padding: 8px 12px;
  border: 1.5px solid #A5D6A7; border-radius: 6px;
  font-size: 12px; background: white; outline: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.btn-connect {
  background: #2E7D32; color: white; border: none;
  border-radius: 6px; padding: 8px 14px; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 16px;
}
.stat-card {
  background: white; border-radius: var(--radius-lg);
  padding: 18px; border: 1.5px solid var(--brown-100);
}
.stat-icon { font-size: 26px; margin-bottom: 6px; }
.stat-label { font-size: 11px; font-weight: 700; color: var(--text-light); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.stat-value { font-size: 24px; font-weight: 800; color: var(--text-dark); font-family: 'Playfair Display', serif; }
.stat-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }

.dash-section {
  background: white; border-radius: var(--radius-lg);
  padding: 18px; border: 1.5px solid var(--brown-100); margin-bottom: 14px;
}
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

.history-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--brown-50);
}
.history-item:last-child { border-bottom: none; }
.history-time { font-size: 11px; color: var(--text-light); font-weight: 600; min-width: 50px; padding-top: 2px; }
.history-detail { flex: 1; }
.history-products { font-size: 13px; font-weight: 600; color: var(--text-dark); line-height: 1.4; }
.history-meta { display: flex; gap: 8px; margin-top: 4px; align-items: center; }
.pay-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: var(--brown-100); color: var(--brown-600); }
.pay-tag.qris { background: #E3F2FD; color: #1565C0; }
.history-total { font-weight: 800; color: var(--brown-600); font-size: 14px; font-family: 'Playfair Display', serif; }

.stock-table { width: 100%; border-collapse: collapse; }
.stock-table th { text-align: left; font-size: 11px; font-weight: 700; color: var(--text-light); letter-spacing: 1px; text-transform: uppercase; padding: 6px 0; border-bottom: 2px solid var(--brown-100); }
.stock-table td { padding: 8px 0; border-bottom: 1px solid var(--brown-50); font-size: 13px; }
.stock-bar-wrap { background: var(--brown-50); border-radius: 10px; height: 6px; overflow: hidden; }
.stock-bar { height: 100%; background: var(--brown-400); border-radius: 10px; transition: width 0.5s; }
.stock-bar.low { background: #F57C00; }
.stock-bar.zero { background: var(--danger); }

.laris-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--brown-50); }
.laris-item:last-child { border-bottom: none; }
.laris-rank { width: 24px; height: 24px; background: var(--brown-100); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--brown-600); flex-shrink: 0; }
.laris-rank.gold { background: #FFD700; color: #4A2D18; }
.laris-name { flex: 1; font-weight: 600; font-size: 13px; }
.laris-qty { font-size: 12px; color: var(--text-light); }
.laris-total { font-weight: 700; color: var(--brown-500); font-size: 13px; }

/* ===== MANAJEMEN MENU ===== */
.mgmt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.page-title { font-size: 20px; font-weight: 800; color: var(--text-dark); }
.page-sub { font-size: 13px; color: var(--text-light); }
.btn-add {
  background: var(--brown-600); color: white; border: none;
  border-radius: var(--radius-sm); padding: 10px 18px;
  font-weight: 700; font-size: 13px; cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.btn-add:hover { background: var(--brown-700); }

.menu-table-wrap { background: white; border-radius: var(--radius-lg); border: 1.5px solid var(--brown-100); overflow: hidden; }
.menu-table { width: 100%; border-collapse: collapse; }
.menu-table th { background: var(--brown-50); text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 700; color: var(--text-light); letter-spacing: 1px; text-transform: uppercase; }
.menu-table td { padding: 12px 16px; border-bottom: 1px solid var(--brown-50); font-size: 13px; vertical-align: middle; }
.menu-table tr:last-child td { border-bottom: none; }
.menu-table tr:hover td { background: var(--brown-50); }
.td-name { font-weight: 700; color: var(--text-dark); }
.td-price { font-weight: 600; color: var(--brown-500); }
.action-btns { display: flex; gap: 6px; }
.btn-edit { background: var(--brown-50); border: 1.5px solid var(--brown-200); color: var(--brown-600); border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; }
.btn-edit:hover { background: var(--brown-100); }
.btn-del { background: #FFEBEE; border: 1.5px solid #FFCDD2; color: var(--danger); border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; }
.btn-del:hover { background: #FFCDD2; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(44,26,14,0.5);
  z-index: 200; display: flex;
  align-items: center; justify-content: center; padding: 16px;
}
.modal { background: white; border-radius: var(--radius-lg); padding: 24px; width: 100%; max-width: 400px; }
.modal-title { font-size: 18px; font-weight: 800; color: var(--text-dark); margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--text-light); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 10px 14px; border: 2px solid var(--brown-200); border-radius: var(--radius-sm); font-size: 14px; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-dark); outline: none; transition: border-color 0.15s; }
.form-input:focus { border-color: var(--brown-400); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel { flex: 1; padding: 11px; background: none; border: 2px solid var(--brown-200); border-radius: var(--radius-sm); font-weight: 700; font-size: 14px; cursor: pointer; color: var(--text-mid); font-family: 'Plus Jakarta Sans', sans-serif; }
.btn-save { flex: 1; padding: 11px; background: var(--brown-600); border: none; border-radius: var(--radius-sm); font-weight: 700; font-size: 14px; cursor: pointer; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
.btn-save:hover { background: var(--brown-700); }
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🥛</div>
      <div>
        <div class="logo-text">Susu Monyonyo</div>
        <div class="logo-sub">Sistem Kasir HIMA</div>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showPage('kasir')" id="nav-kasir">🛒 <span class="label">Kasir</span></button>
      <button class="nav-btn" onclick="showPage('dashboard')" id="nav-dashboard">📊 <span class="label">Dashboard</span></button>
      <button class="nav-btn" onclick="showPage('menu')" id="nav-menu">⚙️ <span class="label">Menu</span></button>
    </nav>
  </header>
  <div class="content" id="content"></div>
</div>

<script>
// ==========================================
// DATA & STATE
// ==========================================
const SHEET_KEY = 'susu_sheet_url';
let sheetUrl = localStorage.getItem(SHEET_KEY) || '';

let menus = JSON.parse(localStorage.getItem('susu_menus') || 'null') || [
  { id: 1, nama: 'Susu Monyonyo Coklat',     harga: 10000, stok: 50, emoji: '🍫' },
  { id: 2, nama: 'Susu Monyonyo Plain',       harga: 8000,  stok: 50, emoji: '🥛' },
  { id: 3, nama: 'Susu Monyonyo Choco Oreo',  harga: 12000, stok: 50, emoji: '🍪' },
];

let transaksi = JSON.parse(localStorage.getItem('susu_transaksi') || '[]');
let cart = [];
let payMethod = 'Tunai';
let currentPage = 'kasir';

// ==========================================
// HELPERS
// ==========================================
function saveMenus()   { localStorage.setItem('susu_menus', JSON.stringify(menus)); }
function saveTrx()     { localStorage.setItem('susu_transaksi', JSON.stringify(transaksi)); }
function formatRp(n)   { return 'Rp ' + n.toLocaleString('id-ID'); }

function showNotif(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'notif' + (type === 'error' ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// ==========================================
// ROUTING
// ==========================================
function showPage(p) {
  currentPage = p;
  ['kasir', 'dashboard', 'menu'].forEach(x => {
    document.getElementById('nav-' + x).classList.toggle('active', x === p);
  });
  renderPage();
}

function renderPage() {
  const c = document.getElementById('content');
  if (currentPage === 'kasir')      c.innerHTML = renderKasir();
  else if (currentPage === 'dashboard') c.innerHTML = renderDashboard();
  else                              c.innerHTML = renderMenu();
}

// ==========================================
// HALAMAN KASIR
// ==========================================
function renderKasir() {
  const total = cart.reduce((s, i) => s + i.harga * i.qty, 0);
  return `
  <div class="kasir-grid">
    <!-- Kiri: Pilih Produk -->
    <div class="menu-section">
      <div class="section-title">📋 Pilih Produk</div>
      <div class="menu-grid">
        ${menus.map(m => `
          <div class="menu-card ${m.stok <= 0 ? 'out-of-stock' : ''}" onclick="addToCart(${m.id})">
            <span class="stock-badge ${m.stok <= 5 ? 'low' : ''} ${m.stok <= 0 ? 'zero' : ''}">
              ${m.stok <= 0 ? 'Habis' : m.stok}
            </span>
            <span class="menu-emoji">${m.emoji || '🥛'}</span>
            <div class="menu-name">${m.nama}</div>
            <div class="menu-price">${formatRp(m.harga)}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Kanan: Keranjang -->
    <div class="cart-section">
      <div class="section-title">🛒 Keranjang</div>
      <div class="cart-items">
        ${cart.length === 0
          ? `<div class="cart-empty"><div class="cart-empty-icon">🛒</div>
             <div style="font-weight:600">Belum ada produk</div>
             <div style="font-size:12px;margin-top:4px">Pilih produk di sebelah kiri</div></div>`
          : cart.map(i => `
            <div class="cart-item">
              <div style="flex:1">
                <div class="cart-item-name">${i.emoji || '🥛'} ${i.nama}</div>
                <div class="cart-item-price">${formatRp(i.harga)}/pcs</div>
              </div>
              <div class="qty-ctrl">
                <button class="qty-btn" onclick="changeQty(${i.id}, -1)">−</button>
                <span class="qty-num">${i.qty}</span>
                <button class="qty-btn" onclick="changeQty(${i.id}, 1)">+</button>
              </div>
              <div class="item-total">${formatRp(i.harga * i.qty)}</div>
              <button class="remove-btn" onclick="removeItem(${i.id})">✕</button>
            </div>
          `).join('')}
      </div>

      <div class="cart-footer">
        <div class="total-row">
          <div>
            <div class="total-label">TOTAL BAYAR</div>
            <div class="total-amount">${formatRp(total)}</div>
          </div>
          <div style="text-align:right;font-size:12px;color:var(--text-light)">${cart.length} item</div>
        </div>
        <div class="payment-label">Metode Pembayaran</div>
        <div class="payment-opts">
          <button class="pay-btn ${payMethod === 'Tunai' ? 'selected' : ''}" onclick="selectPay('Tunai')">💵 Tunai</button>
          <button class="pay-btn ${payMethod === 'QRIS' ? 'selected' : ''}" onclick="selectPay('QRIS')">📱 QRIS</button>
        </div>
        <button class="btn-primary" onclick="simpanTransaksi()" ${cart.length === 0 ? 'disabled' : ''}>
          ✅ Simpan Transaksi
        </button>
        <button class="btn-secondary" onclick="resetCart()">🔄 Reset Transaksi</button>
      </div>
    </div>
  </div>`;
}

function addToCart(id) {
  const menu = menus.find(m => m.id === id);
  if (!menu || menu.stok <= 0) { showNotif('⚠️ Stok habis!', 'error'); return; }
  const existing = cart.find(c => c.id === id);
  if (existing) {
    if (existing.qty + 1 > menu.stok) { showNotif('⚠️ Stok tidak cukup!', 'error'); return; }
    existing.qty++;
  } else {
    cart.push({ ...menu, qty: 1 });
  }
  renderPage();
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  const menu = menus.find(m => m.id === id);
  if (!item) return;
  const newQty = item.qty + delta;
  if (newQty <= 0) { removeItem(id); return; }
  if (newQty > menu.stok) { showNotif('⚠️ Stok tidak cukup!', 'error'); return; }
  item.qty = newQty;
  renderPage();
}

function removeItem(id) { cart = cart.filter(c => c.id !== id); renderPage(); }
function selectPay(m)   { payMethod = m; renderPage(); }
function resetCart()    { cart = []; payMethod = 'Tunai'; renderPage(); }

async function simpanTransaksi() {
  if (cart.length === 0) return;
  const total = cart.reduce((s, i) => s + i.harga * i.qty, 0);
  const trx = {
    id: Date.now(),
    waktu: new Date().toISOString(),
    items: cart.map(i => ({ nama: i.nama, qty: i.qty, harga: i.harga })),
    total,
    bayar: payMethod,
  };

  // Kurangi stok
  cart.forEach(ci => {
    const m = menus.find(m => m.id === ci.id);
    if (m) m.stok = Math.max(0, m.stok - ci.qty);
  });

  transaksi.push(trx);
  saveTrx(); saveMenus();
  cart = [];
  renderPage();
  showNotif('✅ Transaksi berhasil disimpan!');

  // Kirim ke Google Sheets (jika URL sudah diset)
  if (sheetUrl) kirimKeSheet(trx);
}

async function kirimKeSheet(trx) {
  try {
    const rows = trx.items.map(i => ({
      id_transaksi: trx.id,
      tanggal: new Date(trx.waktu).toISOString(),
      produk: i.nama,
      qty: i.qty,
      harga: i.harga,
      total: i.harga * i.qty,
      pembayaran: trx.bayar,
    }));
    await fetch(sheetUrl, {
      method: 'POST',
      body: JSON.stringify({ type: 'transaksi', transaksi: rows }),
      headers: { 'Content-Type': 'application/json' },
    });
  } catch (e) {
    console.warn('Gagal sinkron ke Google Sheets:', e);
  }
}

// ==========================================
// HALAMAN DASHBOARD
// ==========================================
function renderDashboard() {
  const today = new Date().toDateString();
  const todayTrx = transaksi.filter(t => new Date(t.waktu).toDateString() === today);
  const totalHari = todayTrx.reduce((s, t) => s + t.total, 0);

  const prodSales = {};
  transaksi.forEach(t => t.items.forEach(i => {
    if (!prodSales[i.nama]) prodSales[i.nama] = { qty: 0, total: 0 };
    prodSales[i.nama].qty   += i.qty;
    prodSales[i.nama].total += i.harga * i.qty;
  }));
  const laris = Object.entries(prodSales).sort((a, b) => b[1].qty - a[1].qty).slice(0, 5);
  const maxStok = Math.max(...menus.map(m => m.stok), 1);

  return `
  <div class="sheets-banner">
    <span style="font-size:24px">📊</span>
    <div class="sheets-text">
      <strong>Integrasi Google Sheets</strong><br>
      Tempelkan URL Google Apps Script Web App di sini agar transaksi otomatis tercatat di spreadsheet.
      <div class="sheets-url-wrap">
        <input type="text" class="sheets-input" id="sheet-url-input"
          placeholder="https://script.google.com/macros/s/..." value="${sheetUrl}">
        <button class="btn-connect" onclick="saveSheetUrl()">💾 Simpan</button>
      </div>
    </div>
  </div>

  <div class="dash-grid">
    <div class="stat-card">
      <div class="stat-icon">💰</div>
      <div class="stat-label">Penjualan Hari Ini</div>
      <div class="stat-value">${formatRp(totalHari)}</div>
      <div class="stat-sub">${todayTrx.length} transaksi hari ini</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🧾</div>
      <div class="stat-label">Total Transaksi</div>
      <div class="stat-value">${transaksi.length}</div>
      <div class="stat-sub">semua waktu</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📦</div>
      <div class="stat-label">Produk Aktif</div>
      <div class="stat-value">${menus.length}</div>
      <div class="stat-sub">menu tersedia</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💵</div>
      <div class="stat-label">Total Omzet</div>
      <div class="stat-value">${formatRp(transaksi.reduce((s, t) => s + t.total, 0))}</div>
      <div class="stat-sub">semua waktu</div>
    </div>
  </div>

  <div class="two-col">
    <div class="dash-section">
      <div class="section-title">🏆 Produk Paling Laris</div>
      ${laris.length === 0
        ? '<p style="color:var(--text-light);font-size:13px">Belum ada data penjualan</p>'
        : laris.map(([nama, s], i) => `
          <div class="laris-item">
            <div class="laris-rank ${i === 0 ? 'gold' : ''}">${i + 1}</div>
            <div class="laris-name">${nama}</div>
            <div class="laris-qty">${s.qty}x</div>
            <div class="laris-total">${formatRp(s.total)}</div>
          </div>
        `).join('')}
    </div>
    <div class="dash-section">
      <div class="section-title">📦 Stok Tersisa</div>
      <table class="stock-table">
        <tr><th>Produk</th><th>Stok</th><th style="width:80px">Bar</th></tr>
        ${menus.map(m => `
          <tr>
            <td>${m.emoji || '🥛'} ${m.nama.split(' ').slice(-1)[0]}</td>
            <td style="font-weight:700;color:${m.stok <= 0 ? 'var(--danger)' : m.stok <= 5 ? '#E65100' : 'var(--text-dark)'}">${m.stok}</td>
            <td>
              <div class="stock-bar-wrap">
                <div class="stock-bar ${m.stok <= 5 ? 'low' : ''}" style="width:${Math.round(Math.min(100, m.stok / maxStok * 100))}%"></div>
              </div>
            </td>
          </tr>
        `).join('')}
      </table>
    </div>
  </div>

  <div class="dash-section">
    <div class="section-title">🧾 Histori Transaksi Terbaru</div>
    ${transaksi.length === 0
      ? '<p style="color:var(--text-light);font-size:13px;text-align:center;padding:20px">Belum ada transaksi</p>'
      : [...transaksi].reverse().slice(0, 10).map(t => `
        <div class="history-item">
          <div class="history-time">${new Date(t.waktu).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}</div>
          <div class="history-detail">
            <div class="history-products">${t.items.map(i => `${i.nama} ×${i.qty}`).join(', ')}</div>
            <div class="history-meta">
              <span class="pay-tag ${t.bayar === 'QRIS' ? 'qris' : ''}">${t.bayar}</span>
              <span style="font-size:11px;color:var(--text-light)">${new Date(t.waktu).toLocaleDateString('id-ID')}</span>
            </div>
          </div>
          <div class="history-total">${formatRp(t.total)}</div>
        </div>
      `).join('')}
  </div>`;
}

function saveSheetUrl() {
  const inp = document.getElementById('sheet-url-input');
  if (inp) { sheetUrl = inp.value.trim(); localStorage.setItem(SHEET_KEY, sheetUrl); showNotif('URL Google Sheets tersimpan!'); }
}

// ==========================================
// HALAMAN MANAJEMEN MENU
// ==========================================
function renderMenu() {
  return `
  <div>
    <div class="mgmt-header">
      <div>
        <div class="page-title">Manajemen Menu</div>
        <div class="page-sub">Kelola produk dan stok Susu Monyonyo</div>
      </div>
      <button class="btn-add" onclick="openAddModal()">+ Tambah Produk</button>
    </div>
    <div class="menu-table-wrap">
      <table class="menu-table">
        <thead>
          <tr><th>Produk</th><th>Harga</th><th>Stok</th><th>Aksi</th></tr>
        </thead>
        <tbody>
          ${menus.map(m => `
            <tr>
              <td>
                <div style="display:flex;align-items:center;gap:8px">
                  <span style="font-size:22px">${m.emoji || '🥛'}</span>
                  <span class="td-name">${m.nama}</span>
                </div>
              </td>
              <td class="td-price">${formatRp(m.harga)}</td>
              <td>
                <span style="font-weight:700;color:${m.stok <= 0 ? 'var(--danger)' : m.stok <= 5 ? '#E65100' : 'var(--success)'}">
                  ${m.stok}
                </span>
              </td>
              <td>
                <div class="action-btns">
                  <button class="btn-edit" onclick="openEditModal(${m.id})">✏️ Edit</button>
                  <button class="btn-del"  onclick="deleteMenu(${m.id})">🗑️ Hapus</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function openAddModal()    { showModal({ id: null, nama: '', harga: '', stok: 50, emoji: '🥛' }); }
function openEditModal(id) { const m = menus.find(m => m.id === id); if (m) showModal({ ...m }); }

function showModal(data) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${data.id ? 'Edit Produk' : 'Tambah Produk Baru'}</div>
      <div class="form-group">
        <label class="form-label">Emoji</label>
        <input class="form-input" id="m-emoji" value="${data.emoji || '🥛'}" placeholder="🥛" maxlength="4">
      </div>
      <div class="form-group">
        <label class="form-label">Nama Produk</label>
        <input class="form-input" id="m-nama" value="${data.nama}" placeholder="Contoh: Susu Monyonyo Vanilla">
      </div>
      <div class="form-group">
        <label class="form-label">Harga (Rp)</label>
        <input class="form-input" id="m-harga" type="number" value="${data.harga}" placeholder="10000" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Stok</label>
        <input class="form-input" id="m-stok" type="number" value="${data.stok}" placeholder="50" min="0">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">Batal</button>
        <button class="btn-save"   onclick="saveMenu(${JSON.stringify(data.id)})">💾 Simpan</button>
      </div>
    </div>`;
  overlay.addEventListener('click', () => overlay.remove());
  document.body.appendChild(overlay);
}

function saveMenu(id) {
  const nama  = document.getElementById('m-nama').value.trim();
  const harga = parseInt(document.getElementById('m-harga').value);
  const stok  = parseInt(document.getElementById('m-stok').value);
  const emoji = document.getElementById('m-emoji').value.trim() || '🥛';

  if (!nama)           { showNotif('Nama produk wajib diisi!', 'error');  return; }
  if (isNaN(harga) || harga < 0) { showNotif('Harga tidak valid!', 'error'); return; }
  if (isNaN(stok)  || stok  < 0) { showNotif('Stok tidak valid!',  'error'); return; }

  if (id) {
    const m = menus.find(m => m.id === id);
    if (m) { m.nama = nama; m.harga = harga; m.stok = stok; m.emoji = emoji; }
  } else {
    menus.push({ id: Date.now(), nama, harga, stok, emoji });
  }

  saveMenus();
  document.querySelector('.modal-overlay').remove();
  showNotif('✅ Produk berhasil disimpan!');
  renderPage();
}

function deleteMenu(id) {
  if (!confirm('Yakin hapus produk ini?')) return;
  menus = menus.filter(m => m.id !== id);
  saveMenus();
  showNotif('Produk dihapus');
  renderPage();
}

// ==========================================
// INIT
// ==========================================
renderPage();
</script>
